<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujograma: acuerdos de los minors - Universidad EIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 2px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        @keyframes pulse-subtle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .instruction-pulse { animation: pulse-subtle 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);
            const [selectedStep, setSelectedStep] = useState(null);

            const tabs = [
                { id: 0, title: "1. Creación y aprobación", icon: "settings" },
                { id: 1, title: "2. Matrícula y cursado", icon: "graduation-cap" },
                { id: 2, title: "3. Certificación y casos", icon: "award" }
            ];

            const ProcessStep = ({ title, responsibles, description, type = "step" }) => {
                const styles = {
                    step: "border-blue-200 bg-white text-slate-800 shadow-sm hover:border-blue-400",
                    decision: "border-amber-400 bg-amber-50 text-amber-900 font-bold shadow-sm hover:bg-amber-100",
                    error: "border-rose-300 bg-rose-50 text-rose-800 hover:bg-rose-100",
                    success: "border-green-600 bg-green-600 text-white font-bold shadow-md hover:bg-green-700"
                };

                return (
                    <div 
                        className={`relative p-4 rounded-xl border-2 transition-all cursor-pointer min-w-[220px] max-w-[260px] flex flex-col gap-2 shrink-0 ${styles[type]}`}
                        onClick={() => setSelectedStep({ title, responsibles, description })}
                    >
                        {responsibles && (
                            <div className="flex gap-1 flex-wrap">
                                {responsibles.map((r, i) => (
                                    <span key={i} className="text-[9px] px-2 py-0.5 bg-slate-100/90 text-slate-700 rounded-md font-bold uppercase border border-slate-200">
                                        {r}
                                    </span>
                                ))}
                            </div>
                        )}
                        <h4 className="text-sm leading-snug font-semibold">{title}</h4>
                        {type === "decision" && (
                            <div className="absolute -right-3 top-1/2 -translate-y-1/2 bg-white rounded-full p-1 border-2 border-amber-400 shadow-sm">
                                <Icon name="help-circle" size={14} className="text-amber-500" />
                            </div>
                        )}
                    </div>
                );
            };

            const Connector = ({ label, color = "slate", vertical = false }) => (
                <div className={`flex items-center justify-center shrink-0 ${vertical ? 'flex-col min-h-[40px]' : 'min-w-[40px]'}`}>
                    <div className={`${vertical ? 'w-1 h-full' : 'h-1 w-full'} bg-${color}-200 relative rounded-full`}>
                        <div className={`absolute ${vertical ? 'bottom-0 -left-1.5 border-l-6 border-r-6 border-t-6 border-transparent border-t-slate-300' : 'right-0 -top-1.5 border-t-6 border-b-6 border-l-6 border-transparent border-l-slate-300'}`} />
                    </div>
                    {label && <span className={`text-[10px] font-black text-${color}-600 ${vertical ? 'ml-6' : 'mt-1'} uppercase tracking-wider`}>{label}</span>}
                </div>
            );

            return (
                <div className="min-h-screen p-4 flex flex-col gap-4">
                    <header className="w-full max-w-[98%] mx-auto">
                        <h1 className="text-3xl font-bold text-slate-800 tracking-tight">Flujograma: acuerdos de los minors académicos</h1>
                        <p className="text-blue-600 text-lg font-semibold mt-0.5">Universidad EIA • Pedagogía y Currículo</p>
                    </header>

                    <div className="flex-1 w-full max-w-[98%] mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-slate-200">
                        {/* Sidebar */}
                        <div className="w-full md:w-64 bg-slate-900 p-5 flex flex-col gap-3 shrink-0">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => { setActiveTab(tab.id); setSelectedStep(null); }}
                                    className={`flex items-center gap-3 px-4 py-4 rounded-xl transition-all text-sm font-bold border-2 ${
                                        activeTab === tab.id 
                                        ? 'bg-blue-600 text-white border-blue-400 shadow-lg' 
                                        : 'text-slate-400 border-transparent hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <Icon name={tab.icon} size={20} />
                                    {tab.title}
                                </button>
                            ))}
                            
                            <div className="mt-auto pt-8">
                                <div className="p-4 bg-slate-800/50 rounded-xl border border-slate-700 text-[11px] text-slate-300 leading-relaxed">
                                    <h5 className="font-black text-blue-400 uppercase mb-2 tracking-widest flex items-center gap-2">
                                        <Icon name="bookmark" size={12} /> Notas clave
                                    </h5>
                                    <ul className="space-y-2 font-medium text-slate-400">
                                        <li>• Solo con asignaturas de pregrado de la Universidad EIA.</li>
                                        <li>• No se incluyen posgrado ni educación continua.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* Contenido Principal */}
                        <div className="flex-1 p-6 overflow-x-auto custom-scrollbar bg-slate-50/50 flex flex-col">
                            {/* Instrucción de Interacción */}
                            <div className="flex items-center justify-center gap-2 mb-6 bg-white py-2 px-6 rounded-xl w-fit mx-auto border border-blue-100 shadow-sm">
                                <Icon name="mouse-pointer-2" size={18} className="text-blue-600 instruction-pulse" />
                                <span className="text-sm font-bold text-slate-700 italic">Haz clic en cada paso para ver el detalle informativo.</span>
                            </div>

                            <div className="flex-1 min-w-max">
                                {/* FASE 1: CREACIÓN */}
                                {activeTab === 0 && (
                                    <div className="flex flex-col gap-8 py-4">
                                        <div className="flex items-center gap-4">
                                            <div className="px-4 py-1.5 bg-green-600 text-white font-black rounded-lg text-[10px] shadow-md shrink-0">INICIO</div>
                                            <ProcessStep title="Proponer idea de minor" responsibles={["Proponente"]} description="El estudiante, profesor o empleado propone una idea inicial fundamentada para un nuevo minor." />
                                            <Connector />
                                            <ProcessStep title="Diligenciar formulario institucional" responsibles={["Proponente"]} description="Presentación formal de la propuesta técnica del minor ante las instancias correspondientes." />
                                            <Connector />
                                            <div className="p-4 rounded-xl bg-amber-50 border border-amber-300 w-72 shadow-sm shrink-0">
                                                <h4 className="text-[10px] font-black text-amber-800 uppercase mb-2 border-b border-amber-200 pb-1">Verificación de criterios</h4>
                                                <ul className="text-[11px] space-y-1 text-amber-900 font-semibold">
                                                    <li>• Propósito formativo definido</li>
                                                    <li>• Carga académica mínima: 9 créditos</li>
                                                    <li>• Articulación gradual y coherente</li>
                                                    <li>• Prerrequisitos y equivalencias</li>
                                                </ul>
                                            </div>
                                            <Connector />
                                            <ProcessStep title="¿Cumple criterios curriculares?" type="decision" description="Evaluación técnica realizada por la Dirección de Pedagogía y Currículo." />
                                            <Connector label="Sí" color="green" />
                                            <ProcessStep title="Revisión Dirección de Programa" responsibles={["Dir. Programa"]} description="Evaluación de la pertinencia del minor dentro del programa académico específico." />
                                        </div>

                                        <div className="flex items-center gap-4 ml-20">
                                            <Icon name="corner-right-down" className="text-slate-300" size={32} />
                                            <Connector label="Sí" color="green" />
                                            <ProcessStep title="Viabilidad por Comité Central" responsibles={["Comité Currículo"]} description="Evaluación final para asegurar la calidad institucional y la viabilidad del minor." />
                                            <Connector label="Aprobado" color="green" />
                                            <ProcessStep title="Gestión de creación en sistema" responsibles={["EduLAB"]} description="Proceso técnico de parametrización de las asignaturas en la plataforma académica." />
                                            <Connector />
                                            <ProcessStep title="Oferta institucional vigente" type="success" description="El minor ya se encuentra disponible para la elección y matrícula de los estudiantes." />
                                            <div className="px-4 py-1.5 bg-slate-800 text-white font-black rounded-lg text-[10px] ml-4 shadow-lg tracking-widest">FIN</div>
                                            
                                            <div className="ml-12 flex items-center gap-3 bg-rose-50/50 p-3 rounded-xl border border-rose-100">
                                                <Icon name="alert-triangle" size={18} className="text-rose-400" />
                                                <div>
                                                    <h5 className="text-[10px] font-black text-rose-500 uppercase tracking-wider mb-1">En caso de no aprobación:</h5>
                                                    <ProcessStep title="Ajustar propuesta / Informar respuesta" type="error" description="Se solicitan los ajustes necesarios o se informa formalmente la decisión al proponente." />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* FASE 2: MATRÍCULA */}
                                {activeTab === 1 && (
                                    <div className="flex flex-col gap-8 py-4">
                                        <div className="flex items-center gap-4">
                                            <div className="px-4 py-1.5 bg-green-600 text-white font-black rounded-lg text-[10px] shadow-md">INICIO</div>
                                            <ProcessStep title="Estudiante con matrícula vigente" responsibles={["Estudiante"]} />
                                            <Connector />
                                            <ProcessStep title="Elegir minor de la oferta" responsibles={["Estudiante"]} />
                                            <Connector />
                                            <ProcessStep title="¿El minor aplica para su programa?" type="decision" />
                                            <Connector label="Sí" color="green" />
                                            <ProcessStep title="Realizar solicitud formal" responsibles={["Dir. Programa"]} />
                                            <Connector />
                                            <ProcessStep title="¿Cumple prerrequisitos 1ra asignatura?" type="decision" />
                                            <Connector label="Sí" color="green" />
                                            <ProcessStep title="¿Hay oferta, cupos y compatibilidad?" type="decision" responsibles={["Sistema"]} />
                                        </div>

                                        <div className="flex items-center gap-4 ml-12">
                                            <Icon name="corner-right-down" className="text-slate-300" size={32} />
                                            <div className="flex flex-row items-center border border-dashed border-blue-200 p-3 rounded-xl bg-white gap-4 shadow-sm">
                                                <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest">Matrícula:</span>
                                                <ProcessStep title="Como optativa / electiva del plan" />
                                                <ProcessStep title="Como créditos adicionales" />
                                            </div>
                                            <Connector />
                                            <ProcessStep title="¿No excede carga máxima?" type="decision" />
                                            <Connector label="Sí" color="green" />
                                            <div className="p-4 bg-blue-700 text-white rounded-xl font-black text-lg shadow-xl uppercase tracking-widest">
                                                CURSAR ASIGNATURAS
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* FASE 3: CERTIFICACIÓN */}
                                {activeTab === 2 && (
                                    <div className="flex flex-col gap-8 py-4">
                                        <div className="flex items-center gap-6">
                                            <ProcessStep title="¿Aprueba todas las asignaturas del minor?" type="decision" responsibles={["Sistema", "Estudiante"]} />
                                            <div className="flex flex-col gap-4">
                                                <div className="flex items-center gap-4">
                                                    <Connector label="Sí" color="green" />
                                                    <div className="flex items-center gap-5 p-5 bg-green-50 border-2 border-green-500 rounded-2xl shadow-lg">
                                                        <Icon name="award" size={32} className="text-green-600" />
                                                        <div>
                                                            <h4 className="text-lg font-black text-green-900 leading-tight">Certificado Académico Complementario</h4>
                                                            <p className="text-sm font-bold text-green-700 italic">Insignia digital institucional</p>
                                                        </div>
                                                        <div className="px-4 py-1.5 bg-slate-800 text-white font-black rounded-lg text-[10px] ml-4">FIN</div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <Connector label="No" color="rose" />
                                                    <ProcessStep title="No se certifica el minor" type="error" />
                                                    <Connector />
                                                    <ProcessStep title="Se reconocen créditos aprobados" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-4">
                                            <h4 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 border-b-2 border-blue-500 w-fit pb-0.5 flex items-center gap-2">
                                                <Icon name="info" size={16} className="text-blue-500" />
                                                Casos especiales
                                            </h4>
                                            <div className="grid grid-cols-5 gap-3">
                                                {[
                                                    { id: 'eg', t: "Egresados", i: "graduation-cap", c: "blue", d: "Finalización hasta 2 años después de graduarse como estudiante transitorio." },
                                                    { id: 're', t: "Reprobación", i: "refresh-cw", c: "rose", d: "Optativa: Repetir o renunciar. Adicional: Repetir hasta aprobar." },
                                                    { id: 'as', t: "Asociación", i: "share-2", c: "purple", d: "Las asignaturas compartidas se reconocen para ambos minors automáticamente." },
                                                    { id: 'sp', t: "2do Programa", i: "school", c: "indigo", d: "Permite homologación si el minor aplica al nuevo plan de estudios." },
                                                    { id: 'ob', t: "Obligatorias", i: "file-text", c: "slate", d: "Sin reconocimiento si más de una materia ya es obligatoria en el pregrado." }
                                                ].map(item => (
                                                    <div key={item.id} className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-blue-400 transition-all cursor-help shrink-0" onClick={() => setSelectedStep({title: item.t, description: item.d})}>
                                                        <div className={`flex items-center gap-2 mb-2 text-${item.c}-600`}>
                                                            <Icon name={item.i} size={18} />
                                                            <h5 className="font-black text-[10px] uppercase">{item.t}</h5>
                                                        </div>
                                                        <p className="text-[11px] text-slate-600 leading-snug font-medium line-clamp-3">{item.d}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Panel de Detalles */}
                            {selectedStep && (
                                <div className="mt-8 p-6 bg-blue-50 border-l-4 border-blue-600 rounded-r-2xl shadow-lg animate-in fade-in slide-in-from-bottom-4 shrink-0">
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="text-xl font-black text-blue-900 tracking-tight leading-none">{selectedStep.title}</h3>
                                        <button onClick={() => setSelectedStep(null)} className="text-blue-400 hover:text-blue-900 transition-colors bg-white p-1 rounded-full shadow-sm">
                                            <Icon name="x-circle" size={24} />
                                        </button>
                                    </div>
                                    <p className="text-base text-blue-800 leading-relaxed font-semibold">
                                        {selectedStep.description}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Footer - Tarjetas Reducidas */}
                    <footer className="w-full max-w-[98%] mx-auto flex flex-col md:flex-row gap-4 mb-2">
                        <div className="flex-1 flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-md">
                            <div className="bg-blue-100 p-2 rounded-lg text-blue-600">
                                <Icon name="info" size={24} />
                            </div>
                            <div>
                                <h6 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Impacto en el promedio</h6>
                                <p className="text-sm md:text-base text-slate-800 font-bold leading-tight tracking-tight">Las asignaturas del minor inciden en el promedio crédito de la carrera.</p>
                            </div>
                        </div>
                        <div className="flex-1 flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-md">
                            <div className="bg-green-100 p-2 rounded-lg text-green-600">
                                <Icon name="check-square" size={24} />
                            </div>
                            <div>
                                <h6 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Requisito de aprobación</h6>
                                <p className="text-sm md:text-base text-slate-800 font-bold leading-tight tracking-tight">Mínimo de 9 créditos académicos por cada minor aprobado institucionalmente.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

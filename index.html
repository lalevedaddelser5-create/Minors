<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujograma: acuerdos de los minors académicos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS SVGs (Reemplazo de lucide-react para versión HTML autónoma) ---
        const Icons = {
            ArrowDown: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
            ),
            CheckCircle: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
            ),
            Info: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            ),
            Users: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ),
            BookOpen: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            ),
            Award: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
            ),
            FileText: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
            ),
            RefreshCcw: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            ),
            AlertTriangle: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            ),
            ChevronDown: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            ),
            ChevronUp: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            ),
            MousePointer2: ({size=24, className=""}) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>
            )
        };

        // --- COMPONENTES BASE ---

        const VNode = ({ title, type = 'process', icon: IconName, onClick, isInteractive = false }) => {
            const baseStyle = "flex flex-col items-center justify-center text-center p-4 rounded-xl border-2 shadow-sm transition-all duration-300 w-full max-w-[16rem] min-h-[5rem] z-10 relative mx-auto";
            
            const typeStyles = {
                start: "bg-emerald-50 border-emerald-500 text-emerald-900 font-semibold rounded-full max-w-[12rem] min-h-[3rem] py-2",
                process: "bg-white border-slate-200 text-slate-700",
                interactive: "bg-blue-50 border-blue-400 text-blue-900 cursor-pointer hover:bg-blue-100 hover:shadow-md hover:-translate-y-1",
                end: "bg-slate-100 border-slate-400 text-slate-800 font-semibold rounded-full max-w-[12rem] min-h-[3rem] py-2"
            };

            const appliedStyle = isInteractive ? typeStyles.interactive : typeStyles[type];
            const RenderIcon = IconName ? Icons[IconName] : null;

            return (
                <div className={`${baseStyle} ${appliedStyle}`} onClick={isInteractive ? onClick : undefined}>
                {RenderIcon && <RenderIcon className={`mb-2 ${isInteractive ? 'text-blue-600' : 'opacity-70'}`} size={20} />}
                <span className="text-sm leading-tight">{title}</span>
                {isInteractive && (
                    <div className="absolute -bottom-3 bg-blue-600 text-white rounded-full p-1 shadow-md animate-bounce">
                    <Icons.MousePointer2 size={12} />
                    </div>
                )}
                </div>
            );
        };

        const VArrow = ({ label }) => (
            <div className="flex flex-col items-center justify-center -my-1 z-0 relative w-full h-10">
                <div className="absolute top-0 bottom-0 w-0.5 bg-slate-300"></div>
                <Icons.ArrowDown className="absolute bottom-0 text-slate-400 bg-slate-50" size={18} />
                {label && (
                <span className="absolute bg-white text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded border border-slate-200 shadow-sm left-1/2 ml-2">
                    {label}
                </span>
                )}
            </div>
        );

        const VDecisionInteractive = ({ title, noLabel, noTarget, noNote }) => {
            const [isExpanded, setIsExpanded] = useState(false);

            return (
                <div className="relative flex flex-col items-center w-full max-w-sm mx-auto">
                <div className="bg-amber-50 border-2 border-amber-300 text-amber-900 font-medium p-4 rounded-xl shadow-sm w-full max-w-[16rem] text-center z-10">
                    <span className="block text-sm mb-3">{title}</span>
                    <button 
                    onClick={() => setIsExpanded(!isExpanded)}
                    className={`flex items-center justify-center w-full text-xs font-bold py-1.5 px-3 rounded-lg transition-colors ${
                        isExpanded ? 'bg-orange-200 text-orange-800' : 'bg-white border border-amber-300 text-amber-700 hover:bg-amber-100'
                    }`}
                    >
                    {isExpanded ? 'Ocultar alternativa' : '¿Qué pasa si es NO?'}
                    {isExpanded ? <Icons.ChevronUp size={14} className="ml-1" /> : <Icons.ChevronDown size={14} className="ml-1" />}
                    </button>
                </div>
                
                <div className={`overflow-hidden transition-all duration-300 ease-in-out flex flex-col items-center w-full ${isExpanded ? 'max-h-48 opacity-100 mt-2' : 'max-h-0 opacity-0'}`}>
                    <div className="w-0.5 h-4 bg-orange-300 border-dashed border-l-2"></div>
                    <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 w-full max-w-[15rem] text-center shadow-inner relative">
                    <span className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">NO</span>
                    <span className="block text-sm font-medium text-orange-900 leading-tight mt-2">{noLabel}</span>
                    {noTarget && (
                        <span className="flex items-center justify-center text-[10px] text-orange-700 font-semibold uppercase mt-2 bg-orange-100 py-1 rounded">
                        <Icons.RefreshCcw size={10} className="mr-1 shrink-0" /> Vuelve a: {noTarget}
                        </span>
                    )}
                    {noNote && <span className="block text-[11px] text-orange-700 mt-1 leading-tight">{noNote}</span>}
                    </div>
                </div>
                </div>
            );
        };

        const AccordionItem = ({ title, children }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border border-slate-200 rounded-lg mb-2 bg-white overflow-hidden shadow-sm">
                <button 
                    className="w-full flex justify-between items-center p-4 text-left hover:bg-slate-50 transition-colors"
                    onClick={() => setIsOpen(!isOpen)}
                >
                    <span className="font-semibold text-sm text-slate-800">{title}</span>
                    {isOpen ? <Icons.ChevronUp size={18} className="text-slate-400" /> : <Icons.ChevronDown size={18} className="text-slate-400" />}
                </button>
                {isOpen && (
                    <div className="p-4 pt-0 text-sm text-slate-600 border-t border-slate-100 bg-slate-50 leading-relaxed">
                    {children}
                    </div>
                )}
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL ---

        function App() {
            const [activeTab, setActiveTab] = useState(0);
            const [modalData, setModalData] = useState(null);
            const [selectedPath, setSelectedPath] = useState(null);

            const tabs = [
                "Creación y aprobación",
                "Matrícula del estudiante",
                "Certificación y casos"
            ];

            const openCriteriosModal = () => {
                setModalData({
                title: "Criterios curriculares a verificar",
                items: [
                    "Propósito formativo definido (competencia).",
                    "Carga académica mínima: 9 créditos.",
                    "Articulación formativa gradual y coherente.",
                    "Prerrequisitos, correquisitos y equivalencias analizadas.",
                    "Origen de las asignaturas (exclusivo pregrado EIA).",
                    "Microcurrículos diseñados y actualizados."
                ]
                });
            };

            return (
                <div className="min-h-screen text-slate-800 font-sans p-4 md:p-6 pb-20">
                
                <header className="max-w-3xl mx-auto mb-6">
                    <h1 className="text-2xl md:text-3xl font-bold text-slate-900 mb-2 tracking-tight">Flujograma: acuerdos de los minors académicos</h1>
                    <p className="text-sm text-slate-600">Universidad EIA - Diagrama de proceso interactivo.</p>
                </header>

                <div className="max-w-3xl mx-auto">
                    <div className="flex flex-wrap gap-2 mb-6 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
                    {tabs.map((tab, index) => (
                        <button
                        key={index}
                        onClick={() => { setActiveTab(index); setSelectedPath(null); }}
                        className={`flex-1 min-w-[140px] px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${
                            activeTab === index 
                            ? 'bg-blue-600 text-white shadow-md' 
                            : 'bg-transparent text-slate-600 hover:bg-slate-50'
                        }`}
                        >
                        {tab}
                        </button>
                    ))}
                    </div>

                    <div className="bg-slate-50 rounded-2xl shadow-md border border-slate-200 overflow-hidden flex flex-col">
                    
                    {/* --- FASE 1: CREACIÓN --- */}
                    {activeTab === 0 && (
                        <div className="animate-in fade-in zoom-in-95 duration-300">
                        <div className="bg-white p-4 border-b border-slate-200 flex flex-col sm:flex-row gap-4 text-xs md:text-sm">
                            <div className="flex items-start text-slate-700 flex-1">
                            <Icons.Users size={16} className="mr-2 text-blue-600 shrink-0 mt-0.5" />
                            <span><strong>Responsables:</strong> Proponente, Dirección de Programa, Comité Central de Currículo, EduLAB.</span>
                            </div>
                            <div className="flex items-start text-slate-700 flex-1">
                            <Icons.Info size={16} className="mr-2 text-blue-600 shrink-0 mt-0.5" />
                            <span><strong>Nota:</strong> Solo asignaturas de pregrado. No aplica posgrados ni educación continua.</span>
                            </div>
                        </div>

                        <div className="flex flex-col items-center py-10 px-4 w-full">
                            <VNode title="Inicio" type="start" />
                            <VArrow />
                            <VNode title="Proponer idea de minor" />
                            <VArrow />
                            <VNode 
                            title="Diligenciar formulario y presentar propuesta" 
                            isInteractive={true} 
                            icon="FileText"
                            onClick={openCriteriosModal} 
                            />
                            <VArrow />
                            <VDecisionInteractive 
                            title="¿Cumple criterios curriculares?" 
                            noLabel="Ajustar propuesta" 
                            noTarget="Diligenciar formulario" 
                            />
                            <VArrow label="Sí" />
                            <VNode title="Revisión de la propuesta por la Dirección" />
                            <VArrow />
                            <VDecisionInteractive 
                            title="¿Director da visto bueno?" 
                            noLabel="Informar no aprobación y solicitar ajustes" 
                            noTarget="Diligenciar formulario" 
                            />
                            <VArrow label="Sí" />
                            <VNode title="Evaluación de viabilidad (Comité Central)" />
                            <VArrow />
                            <VDecisionInteractive 
                            title="¿Comité aprueba creación del minor?" 
                            noLabel="Informar respuesta al solicitante" 
                            noNote="(Se solicitan ajustes o no se aprueba)" 
                            />
                            <VArrow label="Sí" />
                            <VNode title="Gestión de creación en sistema académico" />
                            <VArrow />
                            <VNode title="Incorporación a la oferta institucional" />
                            <VArrow />
                            <VNode title="Fin" type="end" />
                        </div>
                        </div>
                    )}

                    {/* --- FASE 2: MATRÍCULA --- */}
                    {activeTab === 1 && (
                        <div className="animate-in fade-in zoom-in-95 duration-300">
                        <div className="bg-white p-4 border-b border-slate-200 text-sm">
                            <div className="flex items-center text-slate-700">
                            <Icons.Users size={16} className="mr-2 text-blue-600 shrink-0" />
                            <span><strong>Responsables:</strong> Estudiante, Dirección de Programa, Sistema Académico.</span>
                            </div>
                        </div>

                        <div className="flex flex-col items-center py-10 px-4 w-full">
                            <VNode title="Inicio" type="start" />
                            <VArrow />
                            <VNode title="Estudiante con matrícula vigente en pregrado" />
                            <VArrow />
                            <VNode title="Elegir un minor de la oferta institucional" />
                            <VArrow />
                            <VDecisionInteractive title="¿El minor aplica para su programa?" noLabel="No puede obtener reconocimiento del minor" />
                            <VArrow label="Sí" />
                            <VNode title="Realizar solicitud formal ante la Dirección" />
                            <VArrow />
                            <VDecisionInteractive title="¿Cumple prerrequisitos (de asignatura o minor)?" noLabel="Debe cumplir los prerrequisitos antes de matricular" />
                            <VArrow label="Sí" />
                            <VDecisionInteractive title="¿Hay oferta, cupos y compatibilidad horaria?" noLabel="Esperar nueva oferta o disponibilidad de cupos" />
                            <VArrow label="Sí" />

                            <div className="w-full max-w-lg mt-6 bg-white p-6 rounded-xl border border-blue-200 shadow-sm relative">
                            <span className="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-100 text-blue-800 text-[10px] font-bold px-3 py-1 uppercase tracking-wider rounded-full border border-blue-200">
                                Paso interactivo
                            </span>
                            <h3 className="text-center font-semibold text-slate-800 mb-4 text-sm">Selecciona la forma de matrícula del estudiante:</h3>
                            
                            <div className="flex flex-col sm:flex-row gap-3 justify-center mb-6">
                                <button 
                                onClick={() => setSelectedPath('opcion1')}
                                className={`px-4 py-3 rounded-lg text-sm font-medium border-2 transition-all flex-1 ${
                                    selectedPath === 'opcion1' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:border-blue-300 hover:bg-slate-50'
                                }`}
                                >
                                Opción 1: Optativa / Electiva
                                </button>
                                <button 
                                onClick={() => setSelectedPath('opcion2')}
                                className={`px-4 py-3 rounded-lg text-sm font-medium border-2 transition-all flex-1 ${
                                    selectedPath === 'opcion2' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:border-blue-300 hover:bg-slate-50'
                                }`}
                                >
                                Opción 2: Créditos adicionales
                                </button>
                            </div>

                            <div className="min-h-[160px] flex flex-col items-center justify-center bg-slate-50 rounded-lg p-4 border border-dashed border-slate-300">
                                {!selectedPath && (
                                <div className="text-slate-400 text-sm flex flex-col items-center">
                                    <Icons.MousePointer2 size={24} className="mb-2 opacity-50" />
                                    Haz clic en una opción para ver la ruta
                                </div>
                                )}

                                {selectedPath === 'opcion1' && (
                                <div className="animate-in fade-in w-full flex flex-col items-center">
                                    <VNode title="Matricular como optativa o electiva dentro del plan" />
                                    <VArrow />
                                    <VNode title="Cursar asignaturas del minor" icon="BookOpen" type="end" />
                                </div>
                                )}

                                {selectedPath === 'opcion2' && (
                                <div className="animate-in fade-in w-full flex flex-col items-center">
                                    <VNode title="Matricular como créditos adicionales" />
                                    <VArrow />
                                    <VDecisionInteractive 
                                    title="¿No excede carga máxima permitida?" 
                                    noLabel="No puede matricular" 
                                    noNote="(Excede el límite de créditos del periodo)" 
                                    />
                                    <VArrow label="Sí" />
                                    <VNode title="Cursar asignaturas del minor" icon="BookOpen" type="end" />
                                </div>
                                )}
                            </div>
                            </div>

                        </div>
                        </div>
                    )}

                    {/* --- FASE 3: CERTIFICACIÓN --- */}
                    {activeTab === 2 && (
                        <div className="animate-in fade-in zoom-in-95 duration-300">
                        <div className="bg-white p-4 border-b border-slate-200 text-sm">
                            <div className="flex items-center text-slate-700">
                            <Icons.Users size={16} className="mr-2 text-blue-600 shrink-0" />
                            <span><strong>Responsables:</strong> Estudiante, EduLAB, Sistema Académico.</span>
                            </div>
                        </div>

                        <div className="flex flex-col items-center py-10 px-4 w-full border-b border-slate-200 bg-slate-50">
                            <VDecisionInteractive 
                            title="¿Aprueba todas las asignaturas del minor?" 
                            noLabel="No se certifica el minor" 
                            noNote="Se reconocen únicamente los créditos aprobados en el historial del estudiante." 
                            />
                            <VArrow label="Sí" />
                            <VNode title="Obtiene certificado académico complementario" icon="FileText" />
                            <VArrow />
                            <VNode title="Se otorga insignia digital" icon="Award" />
                            <VArrow />
                            <VNode title="Fin" type="end" />
                        </div>

                        <div className="p-6 md:p-8 bg-white">
                            <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center">
                            <Icons.AlertTriangle className="mr-2 text-amber-500" size={20} /> Consideraciones y casos especiales
                            </h3>
                            
                            <div className="max-w-2xl mx-auto">
                            <AccordionItem title="1. Estudiantes egresados">
                                Si el estudiante no termina el minor antes de graduarse, puede finalizarlo hasta por <strong>2 años después</strong> de su graduación matriculándose como estudiante transitorio. El certificado se emitirá una vez apruebe todas las asignaturas requeridas.
                            </AccordionItem>
                            
                            <AccordionItem title="2. Reprobación de asignaturas">
                                <ul className="list-disc pl-5 space-y-1">
                                <li><strong>Si se matriculó como optativa/electiva:</strong> Puede repetirse la asignatura, o bien, renunciar al minor y elegir otra materia de la oferta institucional.</li>
                                <li><strong>Si se matriculó como crédito adicional:</strong> La asignatura deberá repetirse obligatoriamente hasta ser aprobada.</li>
                                </ul>
                            </AccordionItem>

                            <AccordionItem title="3. Asociación con otro minor">
                                Si un minor comparte asignaturas con otro, las asignaturas que el estudiante ya haya aprobado se consideran cursadas para el nuevo minor. Solo deberá matricular y cursar las asignaturas adicionales faltantes.
                            </AccordionItem>

                            <AccordionItem title="4. Estudiantes con segundo programa">
                                Si el minor no aplica para alguno de sus programas, no está habilitado para cursarlo. Sin embargo, si primero cursó el minor y luego inicia un segundo programa en el que sí aplica, puede homologar las asignaturas que ya tiene cursadas y aprobadas.
                            </AccordionItem>

                            <AccordionItem title="5. Cruce con asignaturas obligatorias">
                                Si <strong>más de una asignatura</strong> del minor ya es de carácter obligatorio en el plan de estudios habitual del programa del estudiante, no podrá obtener el reconocimiento de dicho minor.
                            </AccordionItem>
                            </div>
                        </div>
                        </div>
                    )}
                    </div>
                </div>

                {modalData && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setModalData(null)}>
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                        <div className="bg-blue-600 p-4 text-white flex justify-between items-center">
                        <h3 className="font-bold flex items-center text-sm"><Icons.CheckCircle size={18} className="mr-2" /> {modalData.title}</h3>
                        </div>
                        <div className="p-6">
                        <ul className="space-y-3">
                            {modalData.items.map((item, idx) => (
                            <li key={idx} className="flex items-start text-sm text-slate-700">
                                <Icons.CheckCircle size={16} className="text-emerald-500 mr-3 mt-0.5 shrink-0" />
                                <span className="leading-tight">{item}</span>
                            </li>
                            ))}
                        </ul>
                        <button 
                            className="w-full mt-6 bg-slate-100 hover:bg-slate-200 text-slate-800 py-2.5 rounded-lg text-sm font-semibold transition-colors"
                            onClick={() => setModalData(null)}
                        >
                            Entendido
                        </button>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
